# ==================== 项目名称 ====================
name: sql-agent-prod

# ==================== 后端公共环境变量 ====================
# 这里集中管理所有后端服务的环境变量，修改一处全部生效
x-backend-environment: &backend-environment
  PG_HOST: ${PG_HOST:-sqlagent-postgres}
  PG_PORT: ${PG_PORT:-5432}
  PG_DATABASE: ${PG_DATABASE:-sql_agent}
  PG_USER: ${PG_USER:-postgres}
  PG_PASSWORD: ${PG_PASSWORD:-ChangeThisToStrongPassword123!}
  PG_SCHEMA: ${PG_SCHEMA:-sql_agent}
  PG_PUBLIC_SCHEMA: ${PG_PUBLIC_SCHEMA:-public}

  REDIS_URL: redis://sqlagent-redis:6379/0
  CELERY_BROKER_URL: redis://sqlagent-redis:6379/0
  CELERY_RESULT_BACKEND: redis://sqlagent-redis:6379/1

  MILVUS_HOST: ${MILVUS_HOST:-sqlagent-milvus}
  MILVUS_PORT: ${MILVUS_PORT:-19530}

  LLM_BASE_URL: ${LLM_BASE_URL}
  LLM_MODEL_NAME: ${LLM_MODEL_NAME}
  LLM_API_KEY: ${LLM_API_KEY}

  EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/models/bge-small-zh-v1.5}
  UPLOAD_STAGING_DIR: /app/upload_staging

  RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-5}
  MAX_RETRY_COUNT: ${MAX_RETRY_COUNT:-3}
  AUTO_SYNC_ON_STARTUP: ${AUTO_SYNC_ON_STARTUP:-false}

  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-ChangeThisToVeryLongSecretInProduction!}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}

  LOG_ENABLED: ${LOG_ENABLED:-true}
  LOG_DIR: /app/logs
  LOG_FORMAT: ${LOG_FORMAT:-json}
  LOG_MAX_BYTES: ${LOG_MAX_BYTES:-5242880}
  LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT:-5}

  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}


# ==================== 后端公共配置 ====================
x-backend-common: &backend-common
  build:
    context: .
    dockerfile: backend/Dockerfile
  environment:
    <<: *backend-environment
  volumes:
    - ./volumes/upload-staging:/app/upload_staging
    - ./volumes/backend-logs:/app/logs
    - ${EMBEDDING_MODEL_HOST_PATH:-./models/bge-small-zh-v1.5}:${EMBEDDING_MODEL_PATH:-/models/bge-small-zh-v1.5}:ro
  networks:
    - sql-agent


# ==================== 服务定义 ====================
services:

  # ==================== Nginx 反向代理（入口）===================
  sqlagent-nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    image: sql-agent-frontend:prod
    container_name: sqlagent-nginx
    ports:
      - "${HTTP_PORT:-3000}:80"          # 浏览器访问地址
    depends_on:
      sqlagent-backend:
        condition: service_started
    networks:
      - sql-agent
    restart: unless-stopped

  # ==================== 后端主服务 (Gunicorn + Uvicorn) ====================
  sqlagent-backend:
    <<: *backend-common
    container_name: sqlagent-backend
    depends_on:
      sqlagent-postgres:
        condition: service_healthy
      sqlagent-redis:
        condition: service_healthy
      sqlagent-milvus:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped


  # ==================== Celery Worker ====================
  sqlagent-celery-worker:
    <<: *backend-common
    container_name: sqlagent-celery-worker
    command:
      - celery
      - -A
      - tasks:celery_app
      - worker
      - --loglevel=info
      - --pool=solo
      - --concurrency=${CELERY_CONCURRENCY:-4}
    depends_on:
      sqlagent-postgres:
        condition: service_healthy
      sqlagent-redis:
        condition: service_healthy
      sqlagent-milvus:
        condition: service_started
    restart: unless-stopped


  # ==================== 数据库迁移服务 ====================
  sqlagent-migrate:
    <<: *backend-common
    container_name: sqlagent-migrate
    command: ["alembic", "upgrade", "head"]
    depends_on:
      sqlagent-postgres:
        condition: service_healthy
    profiles:
      - tools
    restart: "no"


  # ==================== PostgreSQL 数据库 ====================
  sqlagent-postgres:
    image: postgres:18.1-alpine
    container_name: sqlagent-postgres
    environment:
      POSTGRES_DB: ${PG_DATABASE:-sql_agent}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ChangeThisToStrongPassword123!}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - sql-agent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped


  # ==================== Redis ====================
  sqlagent-redis:
    image: redis:8.6.3-alpine
    container_name: sqlagent-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./volumes/redis:/data
    networks:
      - sql-agent
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped


  # ==================== Milvus 向量数据库 ====================
  sqlagent-etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: sqlagent-etcd
    command:
      - etcd
      - --advertise-client-urls=http://sqlagent-etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
    volumes:
      - ./volumes/etcd:/etcd
    networks:
      - sql-agent
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped


  sqlagent-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: sqlagent-minio
    command: ["minio", "server", "/minio_data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./volumes/minio:/minio_data
    networks:
      - sql-agent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped


  sqlagent-milvus:
    image: milvusdb/milvus:v2.6.15
    container_name: sqlagent-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: sqlagent-etcd:2379
      MINIO_ADDRESS: sqlagent-minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    depends_on:
      sqlagent-etcd:
        condition: service_healthy
      sqlagent-minio:
        condition: service_healthy
    networks:
      - sql-agent
    ports:
      - "19530:19530"
      - "9091:9091"
    restart: unless-stopped


# ==================== 网络 ====================
networks:
  sql-agent:
    driver: bridge
